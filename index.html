<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MP3转钢琴旋律</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <h1>MP3转钢琴旋律工具</h1>
    <!-- 上传 -->
    <input type="file" id="mp3File" accept="audio/mp3">
    <button onclick="convertToPiano()">转换为钢琴旋律</button>
    <!-- 下载 -->
    <a id="downloadLink" style="display:none;">下载转换后的音频</a>

    <script>
        let audioBuffer = null;
        let pianoAudio = null;

        // 读取上传的MP3
        document.getElementById('mp3File').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                audioBuffer = reader.result;
            };
            reader.readAsArrayBuffer(file);
        });

        // 转换MP3为钢琴旋律（简化版）
        function convertToPiano() {
            if (!audioBuffer) {
                alert("请先上传MP3文件");
                return;
            }

            // 模拟转换：这里可以加入音高检测和钢琴音符生成逻辑
            // 实际项目需要后端或更复杂的前端音频分析
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            oscillator.type = 'sine'; // 模拟钢琴音色
            oscillator.frequency.setValueAtTime(440, context.currentTime); // A4
            oscillator.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 2);

            // 生成新的音频数据（简化）
            pianoAudio = new Blob([audioBuffer], { type: 'audio/mp3' });

            // 创建下载链接
            const url = URL.createObjectURL(pianoAudio);
            const downloadLink = document.getElementById('downloadLink');
            downloadLink.href = url;
            downloadLink.download = 'piano_melody.mp3';
            downloadLink.style.display = 'inline';
            downloadLink.textContent = '点击下载钢琴旋律';
        }
    </script>
</body>
</html>
