<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎹 MP3 → 钢琴旋律 · 浏览器转换器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }
    body {
      background: linear-gradient(145deg, #1e2b3a 0%, #0f1a26 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .card {
      background: rgba(22, 34, 45, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 150, 0.2);
      border-radius: 40px;
      box-shadow: 0 25px 40px -10px rgba(0,0,0,0.6), 0 0 0 1px rgba(210, 180, 140, 0.1) inset;
      padding: 32px 28px;
      max-width: 680px;
      width: 100%;
      transition: all 0.2s;
      color: #f0e9e1;
    }
    h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      font-size: 2.1rem;
      letter-spacing: -0.5px;
      margin: 0 0 8px 0;
      color: #fadfad;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .subtitle {
      font-size: 0.95rem;
      margin-bottom: 28px;
      opacity: 0.8;
      border-left: 4px solid #d4af7a;
      padding-left: 16px;
      font-weight: 300;
    }
    .upload-area {
      background: rgba(10, 18, 25, 0.7);
      border: 2px dashed #b9a58b;
      border-radius: 28px;
      padding: 28px 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    }
    .upload-area:hover {
      border-color: #ecd59e;
      background: rgba(20, 30, 40, 0.8);
      transform: scale(1.01);
    }
    .upload-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .file-name {
      font-weight: 500;
      margin-top: 10px;
      color: #cfc3b2;
      word-break: break-all;
    }
    input[type="file"] {
      display: none;
    }
    .btn {
      background: #2f404f;
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #f3e7d9;
      box-shadow: 0 8px 0 #121a22, 0 6px 12px rgba(0,0,0,0.3);
      cursor: pointer;
      width: 100%;
      transition: all 0.08s ease;
      border: 1px solid #7e9aaf40;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #121a22, 0 4px 8px rgba(0,0,0,0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 6px 0 #121a22;
      pointer-events: none;
      filter: grayscale(0.5);
    }
    .progress-container {
      background: #1c2936;
      border-radius: 40px;
      height: 14px;
      margin: 16px 0 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 5px #0a1015;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c9aa7b, #e7cba5);
      border-radius: 40px;
      box-shadow: 0 0 10px #eac18580;
      transition: width 0.15s ease;
    }
    .status-text {
      min-height: 32px;
      font-size: 0.95rem;
      color: #b9ad9c;
      margin: 8px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-area {
      background: #16222b;
      border-radius: 24px;
      padding: 20px 18px;
      margin-top: 16px;
      border: 1px solid #4a5f6e30;
    }
    .piano-preview {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .download-btn {
      background: #4e6e5e;
      box-shadow: 0 6px 0 #2c3e35, 0 4px 8px rgba(0,0,0,0.3);
      padding: 12px 22px;
      font-size: 1.1rem;
      width: auto;
      flex: 1;
      min-width: 160px;
      margin-bottom: 0;
    }
    .download-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #2c3e35, 0 4px 8px rgba(0,0,0,0.3);
    }
    audio {
      width: 100%;
      margin-top: 15px;
      border-radius: 30px;
      background: #1e2e3b;
      height: 42px;
    }
    .footnote {
      font-size: 0.8rem;
      margin-top: 18px;
      text-align: center;
      opacity: 0.65;
    }
    .badge {
      background: #2b404e;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
      color: #dfd1be;
    }
    .flex-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
  </style>
  <!-- 音高检测库 (YIN算法，轻量) -->
  <script src="https://cdn.jsdelivr.net/npm/pitchfinder@2.3.2/dist/pitchfinder.min.js"></script>
</head>
<body>
<div class="card">
  <h1>
    <span>🎼</span> 钢琴幻境
  </h1>
  <div class="subtitle">上传 MP3 · 提取旋律 · 钢琴重奏 · 下载成品</div>

  <!-- 上传区域 -->
  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">🎧⬆️</div>
    <div>点击或拖拽 MP3 文件</div>
    <div class="file-name" id="fileNameDisplay">未选择文件</div>
  </div>
  <input type="file" id="fileInput" accept="audio/mp3, audio/mpeg, .mp3">

  <!-- 转换按钮 -->
  <button class="btn" id="convertBtn" disabled>
    <span>✨</span> 转为钢琴旋律 <span>✨</span>
  </button>

  <!-- 进度条 -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status-text" id="statusMessage">
    <span>⚡</span> 等待上传文件...
  </div>

  <!-- 结果展示区 -->
  <div class="result-area" id="resultArea" style="display: none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
      <span style="font-weight: 500;">🎹 钢琴旋律已生成</span>
      <span class="badge" id="noteCountBadge">0 音符</span>
    </div>
    <div class="piano-preview">
      <button class="btn download-btn" id="downloadBtn">
        ⬇️ 下载钢琴版 (.wav)
      </button>
    </div>
    <audio id="previewAudio" controls style="margin-top: 18px;"></audio>
    <div style="margin-top: 12px; font-size: 0.85rem; color: #aab7c2;">
      🎵 基于YIN音高检测 · 单音旋律钢琴化 (推荐清晰人声/独奏)
    </div>
  </div>
  <div class="footnote">
    🎶 纯浏览器转换 · 不上传服务器
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM 元素 ----------
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const convertBtn = document.getElementById('convertBtn');
    const progressBar = document.getElementById('progressBar');
    const statusMessage = document.getElementById('statusMessage');
    const resultArea = document.getElementById('resultArea');
    const downloadBtn = document.getElementById('downloadBtn');
    const previewAudio = document.getElementById('previewAudio');
    const noteCountBadge = document.getElementById('noteCountBadge');

    // ---------- 全局变量 ----------
    let audioBuffer = null;                // 原始解码音频
    let pianoAudioBuffer = null;           // 渲染后的钢琴旋律 (AudioBuffer)
    let isProcessing = false;
    let currentFileName = '';

    // 音频上下文 (用于解码和渲染)
    let audioCtx = null;
    
    // 初始化 AudioContext (在用户交互时创建)
    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // 保证状态是 running (某些浏览器需要)
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    // ---------- 工具函数：更新UI状态 ----------
    function setStatus(text, isError = false) {
      statusMessage.innerHTML = `<span>${isError ? '❌' : '🔊'}</span> ${text}`;
      if (isError) {
        statusMessage.style.color = '#f3a39b';
      } else {
        statusMessage.style.color = '#b9ad9c';
      }
    }

    function setProgress(percent) {
      progressBar.style.width = Math.min(100, Math.max(0, percent)) + '%';
    }

    // ---------- 文件处理 ----------
    function handleFileSelect(file) {
      if (!file) return;
      
      if (!file.name.toLowerCase().endsWith('.mp3') && file.type !== 'audio/mpeg' && !file.name.match(/\.mp3$/i)) {
        setStatus('请选择 MP3 文件', true);
        return;
      }
      
      currentFileName = file.name;
      fileNameDisplay.textContent = `📁 ${file.name}`;
      convertBtn.disabled = false;
      setStatus(`已加载: ${file.name} · 点击转换`);
      setProgress(0);
      
      // 清空之前的结果
      pianoAudioBuffer = null;
      resultArea.style.display = 'none';
      previewAudio.src = '';
    }

    // 上传区域点击
    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files[0]);
      }
    });

    // 拖拽支持
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#ecd59e';
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#b9a58b';
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#b9a58b';
      const file = e.dataTransfer.files[0];
      if (file) {
        handleFileSelect(file);
        fileInput.files = e.dataTransfer.files; // 同步
      }
    });

    // ---------- 解码 MP3 为 AudioBuffer ----------
    async function decodeMP3(file) {
      const ctx = initAudioContext();
      const arrayBuffer = await file.arrayBuffer();
      setStatus('解码音频中...', false);
      setProgress(15);
      const decoded = await ctx.decodeAudioData(arrayBuffer);
      setProgress(30);
      return decoded;
    }

    // ---------- 核心：音高检测 + 音符分段 (YIN) ----------
    function detectPitchAndNotes(buffer) {
      setStatus('🎯 音高检测中 (YIN算法)...', false);
      setProgress(35);
      
      // 取单声道数据
      const rawData = buffer.getChannelData(0);
      const sampleRate = buffer.sampleRate;
      
      // 创建 YIN 检测器 (使用 pitchfinder)
      const yinDetector = pitchfinder.YIN({ sampleRate, threshold: 0.15 });
      
      // 参数设置
      const frameSize = 2048;
      const hopSize = 512;          // 约 11.6ms (44100下) 平衡精度
      const minNoteDuration = 0.06;  // 最短音符60ms
      const minSilenceDuration = 0.03;
      
      const frequencies = [];
      const frameTimes = [];
      const rmsValues = [];
      
      // 计算帧数
      const numFrames = Math.floor((rawData.length - frameSize) / hopSize) + 1;
      
      // 逐帧分析
      for (let i = 0; i < numFrames; i++) {
        const start = i * hopSize;
        const frame = rawData.slice(start, start + frameSize);
        
        // 计算RMS (能量)
        let sum = 0;
        for (let j = 0; j < frame.length; j++) sum += frame[j] * frame[j];
        const rms = Math.sqrt(sum / frame.length);
        rmsValues.push(rms);
        
        // 音高检测
        let freq = yinDetector(frame);
        // 有时YIN返回0或负值，过滤
        if (freq && freq > 65 && freq < 2100) { // 钢琴旋律通常范围
          frequencies.push(freq);
        } else {
          frequencies.push(0);
        }
        frameTimes.push(start / sampleRate);
      }
      
      setProgress(55);
      setStatus('✂️ 分割音符...', false);
      
      // 动态能量阈值 (静音判定)
      const maxRms = Math.max(...rmsValues, 0.0001);
      const silenceThresh = maxRms * 0.015; 
      
      // 将频率转为MIDI音符编号 (A4=440Hz -> 69)
      const freqToMidi = (f) => f > 0 ? Math.round(12 * Math.log2(f / 440) + 69) : -1;
      
      // 音符分割状态机
      const notes = [];
      let noteOn = false;
      let currentMidi = -1;
      let noteStartTime = 0;
      let noteStartFrame = 0;
      let maxAmpInNote = 0;
      
      for (let i = 0; i < numFrames; i++) {
        const freq = frequencies[i];
        const time = frameTimes[i];
        const rms = rmsValues[i];
        const isSilent = rms < silenceThresh;
        
        let midi = -1;
        if (!isSilent && freq > 0) {
          midi = freqToMidi(freq);
        }
        
        if (!noteOn) {
          // 开始新音符：有音高且能量足够
          if (midi !== -1) {
            noteOn = true;
            currentMidi = midi;
            noteStartTime = time;
            noteStartFrame = i;
            maxAmpInNote = rms;
          }
        } else {
          // 音符持续中
          const midiChanged = (midi !== -1 && midi !== currentMidi);
          const longSilence = isSilent && (time - noteStartTime) > minSilenceDuration;
          
          // 跟踪最大幅度 (用于力度)
          if (rms > maxAmpInNote) maxAmpInNote = rms;
          
          // 结束条件: 静音过长 或 音高变化(且新音高稳定)
          if (longSilence || midiChanged) {
            let endTime = time;
            // 如果是音高变化，结束于变化前一点点
            if (midiChanged && !isSilent) {
              endTime = Math.max(noteStartTime + 0.02, time - 0.01);
            }
            
            const duration = endTime - noteStartTime;
            if (duration >= minNoteDuration && currentMidi >= 21 && currentMidi <= 108) {
              // 力度映射 (基于最大振幅)
              const velocity = Math.min(127, Math.floor(40 + 60 * (maxAmpInNote / maxRms)));
              notes.push({
                midi: currentMidi,
                startTime: noteStartTime,
                duration: duration,
                velocity: velocity
              });
            }
            
            // 如果是因为音高变化，立即开始新音符 (不跳过当前帧)
            if (midiChanged && !isSilent) {
              noteOn = true;
              currentMidi = midi;
              noteStartTime = time;
              noteStartFrame = i;
              maxAmpInNote = rms;
            } else {
              noteOn = false;
              currentMidi = -1;
            }
          }
        }
      }
      
      // 处理最后一个未结束的音符
      if (noteOn) {
        const endTime = frameTimes[numFrames-1] + hopSize/sampleRate;
        const duration = endTime - noteStartTime;
        if (duration >= minNoteDuration && currentMidi >= 21 && currentMidi <= 108) {
          const velocity = Math.min(127, Math.floor(40 + 60 * (maxAmpInNote / maxRms)));
          notes.push({
            midi: currentMidi,
            startTime: noteStartTime,
            duration: duration,
            velocity: velocity
          });
        }
      }
      
      setProgress(70);
      setStatus(`🎶 检测到 ${notes.length} 个音符`, false);
      return { notes, totalDuration: buffer.duration };
    }

    // ---------- 钢琴音色合成 (使用 Web Audio 原生节点, 模拟钢琴) ----------
    function renderPianoMelody(notes, totalDuration, sampleRate = 44100) {
      setStatus('🎹 合成钢琴旋律...', false);
      setProgress(80);
      
      const offlineCtx = new OfflineAudioContext({
        numberOfChannels: 2,
        length: Math.ceil(totalDuration * sampleRate) + sampleRate * 0.5, // 留余量
        sampleRate: sampleRate
      });
      
      const now = 0;
      const masterGain = offlineCtx.createGain();
      masterGain.gain.value = 0.9;
      masterGain.connect(offlineCtx.destination);
      
      // 混响效果 (简单卷积模拟? 用延迟+滤波模拟大厅感)
      const reverb = offlineCtx.createConvolver();
      // 生成简单混响脉冲
      const irLength = sampleRate * 1.2;
      const irBuffer = offlineCtx.createBuffer(2, irLength, sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const data = irBuffer.getChannelData(ch);
        for (let i = 0; i < irLength; i++) {
          const t = i / sampleRate;
          data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 2.5);
        }
      }
      reverb.buffer = irBuffer;
      
      const dryGain = offlineCtx.createGain();
      const wetGain = offlineCtx.createGain();
      dryGain.gain.value = 0.7;
      wetGain.gain.value = 0.35;
      
      dryGain.connect(masterGain);
      wetGain.connect(masterGain);
      reverb.connect(wetGain);
      
      // 辅助函数：为每个音符创建钢琴声 (简易物理建模风格)
      const createPianoVoice = (midi, start, duration, velocity) => {
        const freq = 440 * Math.pow(2, (midi - 69) / 12);
        const velNorm = velocity / 127; // 0..1
        
        // 每个音符一个小的子图
        const noteGain = offlineCtx.createGain();
        noteGain.gain.value = 0;
        noteGain.gain.setValueAtTime(0, start);
        // 钢琴包络: 快速起音，衰减至持续，释放
        const attack = 0.005;
        const decay = 0.2;
        const sustain = 0.18 * velNorm;
        noteGain.gain.linearRampToValueAtTime(0.45 * velNorm, start + attack);
        noteGain.gain.linearRampToValueAtTime(sustain, start + attack + decay);
        const releaseStart = start + duration;
        noteGain.gain.setValueAtTime(sustain, releaseStart);
        noteGain.gain.linearRampToValueAtTime(0, releaseStart + 0.1);
        
        // 基频振荡器 (三角波，有温暖感)
        const osc1 = offlineCtx.createOscillator();
        osc1.type = 'triangle';
        osc1.frequency.value = freq;
        
        // 第二振荡器 高八度/五度? 增加明亮度
        const osc2 = offlineCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2.0; 
        
        const oscGain1 = offlineCtx.createGain();
        const oscGain2 = offlineCtx.createGain();
        oscGain1.gain.value = 0.8;
        oscGain2.gain.value = 0.25 * velNorm;
        
        // 轻微失真/滤波 (模拟琴弦)
        const filter = offlineCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 3500 + midi * 50;
        filter.Q.value = 1;
        
        osc1.connect(oscGain1);
        osc2.connect(oscGain2);
        oscGain1.connect(filter);
        oscGain2.connect(filter);
        filter.connect(noteGain);
        
        // 连接到干湿
        noteGain.connect(dryGain);
        noteGain.connect(reverb);
        
        osc1.start(start);
        osc2.start(start);
        osc1.stop(releaseStart + 0.15);
        osc2.stop(releaseStart + 0.15);
      };
      
      // 渲染所有音符
      notes.forEach(n => {
        createPianoVoice(n.midi, n.startTime, n.duration, n.velocity);
      });
      
      setProgress(90);
      setStatus('🎼 离线渲染中... (请稍候)', false);
      
      return offlineCtx.startRendering();
    }

    // ---------- AudioBuffer 转 WAV (下载用) ----------
    function audioBufferToWav(buffer) {
      const numChannels = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const format = 1; // PCM
      const bitDepth = 16;
      
      const bytesPerSample = bitDepth / 8;
      const blockAlign = numChannels * bytesPerSample;
      
      const samplesTotal = buffer.length * numChannels;
      const dataLength = samplesTotal * bytesPerSample;
      const bufferLength = 44 + dataLength;
      
      const arrayBuffer = new ArrayBuffer(bufferLength);
      const view = new DataView(arrayBuffer);
      
      // RIFF chunk
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + dataLength, true);
      writeString(view, 8, 'WAVE');
      // fmt subchunk
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, format, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * blockAlign, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitDepth, true);
      // data subchunk
      writeString(view, 36, 'data');
      view.setUint32(40, dataLength, true);
      
      // 写入交错音频数据
      let offset = 44;
      const channelData = [];
      for (let c = 0; c < numChannels; c++) {
        channelData.push(buffer.getChannelData(c));
      }
      
      for (let i = 0; i < buffer.length; i++) {
        for (let c = 0; c < numChannels; c++) {
          let sample = channelData[c][i];
          sample = Math.max(-1, Math.min(1, sample));
          const intVal = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
          view.setInt16(offset, intVal, true);
          offset += 2;
        }
      }
      
      return new Blob([arrayBuffer], { type: 'audio/wav' });
      
      function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }
    }

    // ---------- 转换主流程 ----------
    async function convertToPiano() {
      if (!fileInput.files[0] || isProcessing) return;
      
      const file = fileInput.files[0];
      isProcessing = true;
      convertBtn.disabled = true;
      resultArea.style.display = 'none';
      setProgress(5);
      setStatus('⏳ 准备处理...');
      
      try {
        // 1. 解码
        audioBuffer = await decodeMP3(file);
        
        // 2. 音高检测 + 音符分割
        const { notes, totalDuration } = detectPitchAndNotes(audioBuffer);
        
        if (notes.length === 0) {
          throw new Error('未检测到有效旋律。请尝试清晰的人声或单音乐器录音。');
        }
        
        noteCountBadge.textContent = `${notes.length} 音符`;
        
        // 3. 渲染钢琴音频
        const renderSampleRate = 44100; 
        pianoAudioBuffer = await renderPianoMelody(notes, totalDuration, renderSampleRate);
        
        setProgress(100);
        setStatus(`✅ 转换完成！生成 ${notes.length} 个钢琴音符`, false);
        
        // 4. 展示结果
        const wavBlob = audioBufferToWav(pianoAudioBuffer);
        const audioUrl = URL.createObjectURL(wavBlob);
        previewAudio.src = audioUrl;
        
        // 保存用于下载
        downloadBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = audioUrl;
          a.download = `piano_${currentFileName.replace(/\.mp3$/i,'') || 'melody'}.wav`;
          a.click();
        };
        
        resultArea.style.display = 'block';
        
      } catch (error) {
        console.error(error);
        setStatus(`错误: ${error.message || '转换失败'}`, true);
        setProgress(0);
      } finally {
        isProcessing = false;
        convertBtn.disabled = false;
      }
    }

    // 绑定转换按钮
    convertBtn.addEventListener('click', convertToPiano);

    // 页面加载后尝试恢复音频上下文 (用户手势)
    document.body.addEventListener('click', () => {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }, { once: false });

    // 初始化显示
    setStatus('🎧 上传 MP3 开始', false);
  })();
</script>
</body>
</html>
